aid: imap
name: IMAP
description: >-
  IMAP (Internet Message Access Protocol) is a standard email protocol that
  allows email clients to access and manage email messages stored on a mail
  server. IMAP enables users to view and manage email from multiple devices
  while keeping messages synchronized on the server.
